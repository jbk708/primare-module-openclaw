# Local development only.
#
# Production deployment goes through primare-infra's generic roles/module/
# Ansible role (TASK-12 T12-3), which renders the compose fragment from the
# registry entry in ansible/modules.yml.
# Do not use this file for production deploys.

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    env_file:
      - .env
    volumes:
      - openclaw_config:/opt/spark/openclaw/config
      - openclaw_workspace:/opt/spark/openclaw/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    # Ports are NOT exposed to the host in production — Caddy is the sole
    # ingress. Exposing here for local development only.
    ports:
      - "18789:18789"
      - "8000:8000"
    restart: unless-stopped

volumes:
  openclaw_config:
  openclaw_workspace:
