# hooks.yml — primare-module-openclaw hook manifest.
#
# Changelog (since primare-infra T13-20 the deploy role hashes the whole bundle
# — hooks.yml + every file under hooks/ — so editing a sub-file alone is enough
# to force a re-fetch on next deploy; this changelog is now purely human-facing):
#   v2026.4.14-7 — smoke-test reads openclaw.json directly instead of
#                  `openclaw agents list`. The CLI resolves every channel's
#                  SecretRef up-front, so a configured-but-not-bound Discord
#                  channel made `agents list` abort before producing output —
#                  even when the demo agent was correctly written. Same dodge
#                  already used in create-default-agent.yml.
#   v2026.4.14-6 — all docker exec calls run as -u node so openclaw CLI writes
#                  config to /home/node/.openclaw (where the gateway reads from)
#                  instead of /root/.openclaw (where root's docker exec would
#                  otherwise land it). Silently broke apply-config + discord +
#                  agent hooks in v-1..v-5 — config changes never reached the
#                  gateway's actual config file.
#   v2026.4.14-5 — smoke-test /readyz poll via `docker exec curl` instead of
#                  localhost:18789 (port 18789 is container-internal; no host
#                  publish per T12-11 "Caddy is sole ingress").
#   v2026.4.14-2 — persist-gateway-token lineinfile create: true (first-deploy
#                  .env did not exist); supervisord HOME/USER env (image).
#   v2026.4.14-1 — initial release.
#
# Each list item is a PATH (relative to repo root) to an Ansible task file.
# The primare-infra generic module role (T12-18) fetches every hooks/* asset
# from the release and include_tasks's each path below in order.
#
# Secrets flow via Ansible extravars at deploy time — they are never stored
# in this file. Required extravars:
#   openclaw_gateway_token
#   openclaw_litellm_key
#   openclaw_discord_bot_token  (only consumed by configure-discord + bind hooks)
pre_up:
  - hooks/set-defaults.yml
  - hooks/assert-secrets.yml
  - hooks/persist-gateway-token.yml
  - hooks/create-dirs.yml
post_up:
  - hooks/apply-config.yml
  - hooks/create-default-agent.yml
  - hooks/configure-discord.yml
  - hooks/bind-discord-agent.yml
  - hooks/install-log-metrics.yml
  - hooks/smoke-test.yml
