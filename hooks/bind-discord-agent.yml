# bind-discord-agent.yml — bind the default agent to the Discord channel.
#
# Skipped when openclaw_discord_guilds is empty. Uses the config file to check
# for an existing binding before issuing the bind command so the hook is
# idempotent.
- name: "openclaw | bind-discord-agent — re-read config to check existing bindings"
  ansible.builtin.slurp:
    src: "{{ openclaw_config_dir }}/openclaw.json"
  register: _openclaw_config_raw2
  when: openclaw_discord_guilds | length > 0

- name: "openclaw | bind-discord-agent — bind default agent to discord channel"
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - node
      - "{{ module_name }}"
      - openclaw
      - agents
      - bind
      - --agent
      - "{{ openclaw_default_agent_id }}"
      - --bind
      - discord
  register: _openclaw_bind
  changed_when: "'Added bindings' in _openclaw_bind.stdout"
  when:
    - openclaw_discord_guilds | length > 0
    - (_openclaw_config_raw2.content | b64decode | from_json).bindings | default([]) |
      selectattr('agentId', 'equalto', openclaw_default_agent_id) |
      selectattr('match.channel', 'equalto', 'discord') | list | length == 0
