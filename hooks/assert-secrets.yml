# assert-secrets.yml — fail loudly if required extravars are missing or placeholder.
#
# An empty or "placeholder" gateway token caused the image's baked-in default
# to leak into gateway.auth.token, producing the "Discord bot typing indicator
# but no reply" symptom (primare-infra PR #15). Fail at hook entry instead of
# deploying a silently-broken stack.
#
# Required Ansible extravars (age-encrypted at rest in primare-infra):
#   openclaw_gateway_token       — ansible/secrets/modules/openclaw/gateway_token.age
#   openclaw_litellm_key         — ansible/secrets/modules/openclaw/litellm_key.age
#   openclaw_discord_bot_token   — ansible/secrets/modules/openclaw/discord_bot_token.age
- name: "openclaw | assert-secrets — gateway_token present and non-placeholder"
  ansible.builtin.assert:
    that:
      - openclaw_gateway_token is defined
      - openclaw_gateway_token | length > 0
      - openclaw_gateway_token != "placeholder"
    fail_msg: >-
      openclaw_gateway_token must be provided at deploy time and must not be
      "placeholder". Decrypt ansible/secrets/modules/openclaw/gateway_token.age
      and pass the value with -e openclaw_gateway_token=<value>.
      See docs/operations/troubleshooting-guide.md § "OpenClaw Discord bot
      typing indicator but no reply" for the incident that motivated this assert.

- name: "openclaw | assert-secrets — litellm_key present"
  ansible.builtin.assert:
    that:
      - openclaw_litellm_key is defined
      - openclaw_litellm_key | length > 0
    fail_msg: >-
      openclaw_litellm_key must be provided at deploy time.
      Decrypt ansible/secrets/modules/openclaw/litellm_key.age and pass the
      value with -e openclaw_litellm_key=<value>.

- name: "openclaw | assert-secrets — discord_bot_token present"
  ansible.builtin.assert:
    that:
      - openclaw_discord_bot_token is defined
      - openclaw_discord_bot_token | length > 0
    fail_msg: >-
      openclaw_discord_bot_token must be provided at deploy time.
      Decrypt ansible/secrets/modules/openclaw/discord_bot_token.age and pass
      the value with -e openclaw_discord_bot_token=<value>.
      Even if Discord is not configured (openclaw_discord_guilds: {}), the
      token must be present so the container has DISCORD_BOT_TOKEN available
      at runtime for on-the-fly Discord enablement without a redeploy.
