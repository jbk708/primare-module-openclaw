# create-default-agent.yml — create the default routable agent if absent.
#
# Uses the config file (slurp + parse) rather than `openclaw agents list`
# because the latter needs an active gateway to resolve SecretRefs for other
# channels. Reading the JSON file is runtime-free and idempotent.
- name: "openclaw | create-default-agent — slurp openclaw.json to check existing agents"
  ansible.builtin.slurp:
    src: "{{ openclaw_config_dir }}/openclaw.json"
  register: _openclaw_config_raw

- name: "openclaw | create-default-agent — parse openclaw.json"
  ansible.builtin.set_fact:
    _openclaw_config_json: "{{ _openclaw_config_raw.content | b64decode | from_json }}"

- name: "openclaw | create-default-agent — add agent if not present"
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ module_name }}"
      - openclaw
      - agents
      - add
      - "{{ openclaw_default_agent_id }}"
      - --non-interactive
      - --workspace
      - "/home/node/.openclaw/workspace/{{ openclaw_default_agent_id }}"
      - --agent-dir
      - "/home/node/.openclaw/agents/{{ openclaw_default_agent_id }}"
      - --model
      - "{{ openclaw_default_agent_model }}"
  when: openclaw_default_agent_id not in (_openclaw_config_json.agents.list | default([]) | map(attribute='id') | list)
  changed_when: true
