# Docker Build & Push
# Triggers on version tags (v*)
# Builds multi-platform images (amd64, arm64) and pushes to GHCR.
# Also uploads caddy.snippet, hooks.yml, and all hooks/ task files as
# release assets so primare-infra's generic module role can fetch them.

name: Docker Build & Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jbk708/primare-module-openclaw
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            WRAPPER_VERSION=${{ steps.meta.outputs.version }}

      - name: Publish release assets (caddy snippet + hooks)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp configs/caddy/module.caddy caddy.snippet
          sha256sum caddy.snippet | awk '{print $1}' > caddy.snippet.sha256
          assets=(caddy.snippet caddy.snippet.sha256)
          # hooks.yml is optional per T12-18 — skip if the module doesn't ship one.
          # Per-task files referenced from hooks.yml live under hooks/ and ship alongside.
          if [ -f hooks.yml ]; then
            sha256sum hooks.yml | awk '{print $1}' > hooks.yml.sha256
            assets+=(hooks.yml hooks.yml.sha256)
            if [ -d hooks ]; then
              while IFS= read -r -d '' f; do
                assets+=("$f")
              done < <(find hooks -type f -print0)
            fi
          fi
          gh release create "${GITHUB_REF_NAME}" --generate-notes "${assets[@]}"
